<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="src/style.css">
  <link rel="icon" type="image/svg+xml" href="src/img/logo_cassiani.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cassiani</title>
  <script src="https://kit.fontawesome.com/90cf7aff80.js" crossorigin="anonymous"></script>

</head>

<body>
  <header class="flex flex-row justify-around w-full h-15 bg-black font-serif  text-gray-300">
    <img src="src/assets/logos_img/LogoCassiani.png" alt="">
    <nav class="flex flex-row items-center text-xs gap-x-8">
        <a id="btn_home" class="hover-underline hover:cursor-pointer" >INICIO</a>
        <a id="btn_model" class="hover-underline hover:cursor-pointer" >MODELOS</a>
        <a id="btn_services" class="hover-underline hover:cursor-pointer" >SERVICIOS</a>
        <a id="btn_buy" class="hover-underline hover:cursor-pointer" >COMPRAR</a>
    </nav>
    <div class="flex items-center">
      <button id="btn_login" value="default" class="flex flex-row gap-2 h-5 items-center font-serif uppercase text-white text-xs rounded-2xl p-2 border border-gray-300 hover:cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        </svg>
        Login
      </button>
      <div class="relative inline-block" id="users_menu_wrapper">
        <button id="btn_users" type="button" aria-expanded="false" aria-controls="users_menu" class="flex flex-row gap-2 items-center font-serif uppercase text-white text-xs rounded-2xl p-2 border border-gray-300 hover:cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" />
          </svg>
        </button>
        <div id="users_menu" class="hidden absolute right-0 mt-2 w-48 rounded-xl border border-gray-300 bg-black shadow-lg z-50">
          <button class="menu-item w-full text-left px-4 py-3 text-sm text-white hover:bg-gray-800" data-route="/profile">
            Perfil
          </button>
          <button class="menu-item w-full text-left px-4 py-3 text-sm text-white hover:bg-gray-800" data-route="/users">
            Users
          </button>
          <button class="menu-item w-full text-left px-4 py-3 text-sm text-white hover:bg-gray-800" data-route="/vehicles">
            Vehículos
          </button>
          <button class="menu-item w-full text-left px-4 py-3 text-sm text-red-400 hover:bg-gray-800" id="btn_logout">
            Cerrar sesión
          </button>
        </div>
      </div>
    </div>
  </header>

  <div id="app"></div>
  <script src="src/utils/btn_save_users.js"></script>  
  <script type="module" src="src/main.js"></script>
</body>

</html>
